<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Management System - Đăng ký</title>
  <link rel="stylesheet" href="register.css">
</head>
<body>
  <main class="signup-page">
    <form class="signup-card">
      <h1>Coffee Management System</h1>
      <h2>Đăng ký</h2>

      <div class="input-group">
        <span class="icon">👤</span>
        <input id="name" name="name" type="text" placeholder="Name" required>
      </div>

      <div class="input-group">
        <span class="icon">✉</span>
        <input id="email" name="email" type="email" placeholder="Email" required>
      </div>

      <div class="input-group">
        <span class="icon">🔒</span>
        <input id="password" name="password" type="password" placeholder="Password" required>
      </div>

      <div class="input-group">
        <span class="icon">🔒</span>
        <input id="confirm" name="confirm" type="password" placeholder="Confirm password" required>
      </div>

      <button type="submit">Đăng ký</button>

      <p class="login-text">
        Đã có tài khoản?
        <a href="login.html">Đăng nhập</a>
      </p>
    </form>
  </main>
  <script type="module">
    import { signUp } from './supabase.js';

    const form = document.querySelector('.signup-card');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password !== confirm) {
        alert('Mật khẩu không khớp');
        return;
      }

      const { data, error } = await signUp(email, password, { data: { name } });
      if (error) {
        alert(error.message);
        return;
      }

      alert('Đăng ký thành công! Vui lòng kiểm tra email để xác thực nếu cần.');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
